
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes swing { from{transform:rotate(-8deg)} to{transform:rotate(8deg)} }
  .rifa-title { color: #FFF9E6; font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); margin-top: 12px; }

  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #2ECC71; animation: pulse 2s infinite; }
  .sync-dot.syncing { background: #F39C12; animation: spin 0.8s linear infinite; border-radius: 0; width: 8px; height: 8px; border: 2px solid #F39C12; border-top-color: transparent; border-radius: 50%; }
  .sync-dot.error { background: #E74C3C; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .tab-btn:first-child { border-radius: 10px 0 0 10px; }
  .tab-btn:last-child { border-radius: 0 10px 10px 0; }
  .tab-btn.active { background: #C0392B; color: #fff; border-color: #C0392B; }
  .stats-bar { display: flex; gap: 8px; padding: 0.7rem 1rem 0; justify-content: center; flex-wrap: wrap; }

  .stat-label { font-size: 0.6rem; color: #A04000; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 1.15rem; font-weight: 800; color: #C0392B; line-height: 1.2; margin-top: 1px; }
  .search-wrap { padding: 0.7rem 1rem 0.3rem; }
  .search-rel { position: relative; }
  .search-input { width: 100%; padding: 0.55rem 1rem 0.55rem 2.4rem; border-radius: 50px; border: 1.5px solid #F0B27A; background: #fff; font-family: 'Nunito', sans-serif; font-size: 0.85rem; color: #5D4037; outline: none; transition: border-color .2s, box-shadow .2s; }
  .search-input:focus { border-color: #C0392B; box-shadow: 0 0 0 3px rgba(192,57,43,0.12); }
  .search-input::placeholder { color: #CBA67A; }
  .search-icon-s { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: #CBA67A; font-size: 0.9rem; }
  .grid-container { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 0.5rem 0.8rem; }
  .num-cell { aspect-ratio: 1; border-radius: 9px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform .15s, box-shadow .15s, background .2s; border: 1.5px solid #F5CBA7; background: #fff; user-select: none; overflow: hidden; }
  .num-cell:hover:not(.sold) { transform: scale(1.12); box-shadow: 0 4px 14px rgba(192,57,43,0.22); border-color: #E59866; background: #FEF9F0; z-index: 2; }
  .num-cell .nn { font-size: 0.62rem; font-weight: 700; color: #8B6914; line-height: 1; }
  .num-cell.sold { background: #C0392B; border-color: #922B21; }
  .num-cell.sold:hover { transform: scale(1.08); box-shadow: 0 4px 14px rgba(192,57,43,0.35); z-index: 2; }
  .num-cell.sold .nn { color: #fff; }
  .num-cell.sold .ck { color: #FADBD8; font-size: 0.58rem; font-weight: 800; line-height: 1; }
  .num-cell.sold .bn { font-size: 0.36rem; color: #FADBD8; font-weight: 700; text-align: center; padding: 0 2px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .num-cell.hl { box-shadow: 0 0 0 2.5px #F39C12; transform: scale(1.1); z-index: 3; }

  @keyframes pop { 0%{transform:scale(1)} 30%{transform:scale(1.35)} 60%{transform:scale(0.92)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn .18s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal { background: #FFF8E7; border-radius: 18px; padding: 1.4rem 1.4rem 1.1rem; width: min(92vw, 330px); box-shadow: 0 20px 60px rgba(0,0,0,0.25); animation: slideUp .22s cubic-bezier(0.34,1.56,0.64,1); position: relative; }
  @keyframes slideUp { from{transform:translateY(30px) scale(0.95);opacity:0} to{transform:none;opacity:1} }
  .modal-title { font-size: 1.05rem; font-weight: 800; color: #7B241C; margin-bottom: 0.1rem; }
  .modal-num { font-size: 0.75rem; color: #B03A2E; font-weight: 700; margin-bottom: 0.9rem; }
  .modal input { width: 100%; padding: 0.55rem 0.85rem; border-radius: 10px; border: 1.5px solid #F0B27A; background: #fff; font-family: 'Nunito', sans-serif; font-size: 0.88rem; color: #5D4037; margin-bottom: 0.65rem; outline: none; transition: border-color .2s; }
  .modal input:focus { border-color: #C0392B; }
  .btn-primary { width: 100%; padding: 0.6rem; background: #C0392B; color: #fff; border: none; border-radius: 10px; font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 800; cursor: pointer; transition: background .15s, transform .1s; }
  .btn-primary:hover { background: #A93226; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .btn-secondary { flex:1; padding:0.5rem; background:transparent; color:#C0392B; border:1.5px solid #E59866; border-radius:10px; font-family:'Nunito',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; transition:background .15s; }
  .btn-secondary:hover { background:#FEF0E0; }
  .btn-danger { flex:1; padding:0.5rem; background:transparent; color:#922B21; border:1.5px solid #F1948A; border-radius:10px; font-family:'Nunito',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; transition:background .15s; }
  .btn-danger:hover { background:#FDEDEC; }
  .btn-row { display:flex; gap:8px; margin-top:0.75rem; }
  .modal-close { position:absolute; top:10px; right:12px; background:transparent; border:none; font-size:1.1rem; color:#B07A55; cursor:pointer; padding:2px 6px; border-radius:6px; transition:background .15s; }
  .modal-close:hover { background:#F5CBA7; }
  .info-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:0.45rem; }
  .info-label { font-size:0.7rem; color:#A04000; font-weight:700; text-transform:uppercase; letter-spacing:.7px; min-width:58px; margin-top:1px; }
  .info-value { font-size:0.9rem; color:#5D4037; font-weight:600; word-break:break-word; }
  .empty-msg { text-align:center; padding:2rem 1rem; color:#B07A55; font-size:0.85rem; font-weight:600; grid-column:1/-1; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:8px 18px; border-radius:20px; font-family:'Nunito',sans-serif; font-size:0.82rem; font-weight:700; z-index:2000; animation:toastIn .3s ease; pointer-events:none; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .rifa-sections { }
  .section-panel { display: none; }
  .section-panel.active { display: block; }
  @media(max-width:480px){.grid-container{grid-template-columns:repeat(8,1fr);gap:4px;padding:0.4rem}.rifa-title{font-size:1.1rem}}
</style>

<div id="rifa-app">
  <div class="rifa-header">
    <div class="bandeirinhas">
      <div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div><div class="bandeirinha"></div>
    </div>
    <div class="rifa-title">🎪 Rifa Junina 2025</div>
    <div class="rifa-subtitle">✦ Compartilhada com amigos ✦</div>
    <div class="sync-bar">
      <div class="sync-badge"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Sincronizado</span></div>
      <div class="sync-badge" style="cursor:pointer" onclick="syncNow()">🔄 Atualizar</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('A')">🎟 701–800</button>
    <button class="tab-btn" onclick="switchTab('B')">🎟 1401–1500</button>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="search-wrap">
    <div class="search-rel">
      <span class="search-icon-s">🔍</span>
      <input class="search-input" id="search-input" type="text" placeholder="Pesquisar por número ou nome..." oninput="onSearch(this.value)" />
    </div>
  </div>

  <div class="rifa-sections">
    <div class="section-panel active" id="panel-A">
      <div class="grid-container" id="grid-A"></div>
    </div>
    <div class="section-panel" id="panel-B">
      <div class="grid-container" id="grid-B"></div>
    </div>
  </div>
</div>

<div id="modal-overlay" class="overlay" style="display:none;"></div>

<script>
const RANGES = { A: [701,800], B: [1401,1500] };
const PRICE = 2;
let activeTab = 'A';
let searchTerm = '';
let data = { A: {}, B: {} };
let syncInterval = null;
let isSyncing = false;

// ── Storage helpers ──────────────────────────────────────────────
async function storageGet(key) {
  try {
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}

async function storageSet(key, val) {
  try {
    await window.storage.set(key, JSON.stringify(val), true);
    return true;
  } catch { return false; }
}

// ── Sync ─────────────────────────────────────────────────────────
function setSyncState(state) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  lbl.textContent = state === 'syncing' ? 'Sincronizando…' : state === 'error' ? 'Sem conexão' : 'Sincronizado';
}

async function syncNow() {
  if (isSyncing) return;
  isSyncing = true;
  setSyncState('syncing');
  try {
    const [ra, rb] = await Promise.all([storageGet('rifa_A'), storageGet('rifa_B')]);
    if (ra) data.A = ra;
    if (rb) data.B = rb;
    setSyncState('ok');
    render();
  } catch {
    setSyncState('error');
  }
  isSyncing = false;
}

async function pushData(tab) {
  setSyncState('syncing');
  const ok = await storageSet('rifa_' + tab, data[tab]);
  setSyncState(ok ? 'ok' : 'error');
}

// ── Render ────────────────────────────────────────────────────────
function renderStats() {
  const [s, e] = RANGES[activeTab];
  const total = e - s + 1;
  const sold = Object.keys(data[activeTab]).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="stat-label">🎟 Vendidos</div><div class="stat-value">${sold}</div></div>
    <div class="stat-card"><div class="stat-label">✨ Disponíveis</div><div class="stat-value">${total - sold}</div></div>
    <div class="stat-card"><div class="stat-label">💰 Arrecadado</div><div class="stat-value">R$${(sold*PRICE).toFixed(2)}</div></div>`;
}

function renderGrid(tab) {
  const [s, e] = RANGES[tab];
  const q = searchTerm.trim().toLowerCase();
  const found = new Set();
  if (q) for (let n = s; n <= e; n++) {
    const entry = data[tab][n];
    if (String(n).includes(q) || (entry && entry.name && entry.name.toLowerCase().includes(q))) found.add(n);
  }
  let html = '';
  for (let n = s; n <= e; n++) {
    const entry = data[tab][n];
    const hl = q && found.has(n) ? ' hl' : '';
    if (entry) {
      const sn = entry.name ? entry.name.split(' ')[0] : '';
      html += `<div class="num-cell sold${hl}" data-num="${n}" onclick="openModal('${tab}',${n})"><span class="nn">${n}</span><span class="ck">✔</span><span class="bn">${sn}</span></div>`;
    } else {
      html += `<div class="num-cell${hl}" data-num="${n}" onclick="openModal('${tab}',${n})"><span class="nn">${n}</span></div>`;
    }
  }
  if (q && found.size === 0) html = `<div class="empty-msg">Nenhum resultado para "<b>${q}</b>"</div>`;
  document.getElementById('grid-' + tab).innerHTML = html;
}

function render() {
  renderStats();
  renderGrid('A');
  renderGrid('B');
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='A')||(i===1&&tab==='B')));
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  renderStats();
}

function onSearch(v) { searchTerm = v; renderGrid('A'); renderGrid('B'); }

// ── Modal ─────────────────────────────────────────────────────────
function closeModal() {
  const o = document.getElementById('modal-overlay');
  o.style.display = 'none'; o.innerHTML = '';
}

function openModal(tab, num) {
  const entry = data[tab][num];
  const o = document.getElementById('modal-overlay');
  o.style.display = 'flex';
  const rangeLbl = tab === 'A' ? '701–800' : '1401–1500';
  if (!entry) {
    o.innerHTML = `<div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">Registrar venda</div>
      <div class="modal-num">Número <b>${num}</b> · ${rangeLbl}</div>
      <input id="m-name" type="text" placeholder="Nome da pessoa" autocomplete="off"/>
      <input id="m-phone" type="tel" placeholder="Telefone" autocomplete="off"/>
      <button class="btn-primary" id="btn-sell" onclick="sellNumber('${tab}',${num})">🎉 Marcar como vendido</button>
    </div>`;
    setTimeout(() => { const el = document.getElementById('m-name'); if(el) el.focus(); }, 80);
  } else {
    o.innerHTML = `<div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">Número ${num}</div>
      <div class="modal-num" style="color:#27AE60">✔ Vendido · ${rangeLbl}</div>
      <div class="info-row"><span class="info-label">Nome</span><span class="info-value">${entry.name||'—'}</span></div>
      <div class="info-row"><span class="info-label">Telefone</span><span class="info-value">${entry.phone||'—'}</span></div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="editMode('${tab}',${num})">✏️ Editar</button>
        <button class="btn-danger" onclick="removeNumber('${tab}',${num})">🗑 Remover</button>
      </div>
    </div>`;
  }
}

function editMode(tab, num) {
  const entry = data[tab][num];
  const o = document.getElementById('modal-overlay');
  o.innerHTML = `<div class="modal">
    <button class="modal-close" onclick="openModal('${tab}',${num})">✕</button>
    <div class="modal-title">Editar número ${num}</div>
    <div class="modal-num"></div>
    <input id="m-name" type="text" placeholder="Nome" value="${entry.name||''}" autocomplete="off"/>
    <input id="m-phone" type="tel" placeholder="Telefone" value="${entry.phone||''}" autocomplete="off"/>
    <button class="btn-primary" onclick="saveSell('${tab}',${num})">💾 Salvar</button>
  </div>`;
}

async function sellNumber(tab, num) {
  const name = (document.getElementById('m-name').value||'').trim();
  const phone = (document.getElementById('m-phone').value||'').trim();
  if (!name) { const el = document.getElementById('m-name'); el.focus(); el.style.borderColor='#C0392B'; return; }
  const btn = document.getElementById('btn-sell');
  if (btn) { btn.disabled = true; btn.textContent = 'Salvando…'; }
  data[tab][num] = { name, phone };
  await pushData(tab);
  closeModal();
  render();
  const cell = document.querySelector(`#grid-${tab} [data-num="${num}"]`);
  if (cell) { cell.classList.add('pop-anim'); setTimeout(()=>cell.classList.remove('pop-anim'),500); }
  showToast('✅ Número ' + num + ' vendido para ' + name.split(' ')[0] + '!');
}

async function saveSell(tab, num) {
  const name = (document.getElementById('m-name').value||'').trim();
  const phone = (document.getElementById('m-phone').value||'').trim();
  if (!name) { const el = document.getElementById('m-name'); el.focus(); el.style.borderColor='#C0392B'; return; }
  data[tab][num] = { name, phone };
  await pushData(tab);
  closeModal();
  render();
  showToast('💾 Salvo!');
}

async function removeNumber(tab, num) {
  if (!confirm(`Remover venda do número ${num}?`)) return;
  delete data[tab][num];
  await pushData(tab);
  closeModal();
  render();
  showToast('🗑 Removido.');
}

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Init ──────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.getElementById('modal-overlay').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// Initial load + auto-refresh every 15s
syncNow();
syncInterval = setInterval(syncNow, 15000);
</script>
